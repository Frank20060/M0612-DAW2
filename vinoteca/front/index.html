<!doctype html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cervesa</title>
    <style>
      body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; }
      label { display: block; margin-top: 0.75rem; }
      input, textarea, button { width: 100%; padding: 0.5rem; margin-top: 0.25rem; }
      pre { background: #111; color: #0f0; padding: 0.75rem; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>Nova cervesa</h1>

    <form id="beerForm">
      <label>Nom
        <input type="text" name="nom" required />
      </label>

      <label>Tipus
        <input type="text" name="tipus" />
      </label>

      <label>Graduació
        <input type="number" step="0.1" name="graduacio" />
      </label>

      <label>Descripció
        <textarea name="descripcio" rows="4"></textarea>
      </label>

      <label>Imatge
        <input type="file" name="imatge" accept="image/*" required />
        <!-- accept="image/*" filtra el selector per mostrar principalment fitxers d'imatge (jpg, png, gif, webp, ...).
             És una ajuda d'interfície al navegador, però NO substitueix la validació real del backend (Multer/fileFilter). -->
      </label>

      <button type="submit">Crear cervesa + pujar imatge</button>
    </form>

    <h2>Resposta</h2>
    <pre id="out">Encara sense resposta...</pre>

    <script>
      const API_BASE = 'http://localhost:8000/api/cervezas';
      const TOKEN_ADMIN = 'ENGANXA_AQUI_EL_TOKEN_ADMIN';

      document.getElementById('beerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const form = e.target;
        const fileInput = form.querySelector('input[name="imatge"]');
        const file = fileInput.files[0];
        if (!file) {
          document.getElementById('out').textContent = 'Has de seleccionar una imatge.';
          return;
        }

        try {
          // PAS 1: crear cervesa (sense fitxer)
          const payload = {
            nom: form.nom.value,
            tipus: form.tipus.value,
            graduacio: form.graduacio.value ? Number(form.graduacio.value) : undefined,
            descripcio: form.descripcio.value
          };

          const createRes = await fetch(API_BASE, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${TOKEN_ADMIN}`
            },
            body: JSON.stringify(payload)
          });
          const created = await createRes.json();
          if (!createRes.ok) {
            document.getElementById('out').textContent = JSON.stringify(created, null, 2);
            return;
          }

          const cervezaId = created._id;

          // PAS 2: pujar imatge associada a l'id creat
          const imageData = new FormData();
          // IMPORTANT: "imatge" ha de coincidir amb upload.single('imatge')
          imageData.append('imatge', file);
          const uploadRes = await fetch(`${API_BASE}/${cervezaId}/imatge`, {
            method: 'PATCH',
            headers: {
              // No afegir Content-Type manualment en multipart
              Authorization: `Bearer ${TOKEN_ADMIN}`
            },
            body: imageData
          });
          const updated = await uploadRes.json();

          document.getElementById('out').textContent = JSON.stringify(
            { creada: created, actualitzadaAmbImatge: updated },
            null,
            2
          );

        } catch (err) {
          document.getElementById('out').textContent = 'Error: ' + err.message;
        }
      });
    </script>
  </body>
</html>
